commands:
  install: npm install
  typecheck: npx tsc --noEmit
  build: npm run build
  test: npm run test
  lint: npm run lint

services:
  web:
    start: HOSTNAME=127.0.0.1 PORT=3100 npm run dev -- --hostname 127.0.0.1 --port 3100
    stop: pids=$(lsof -ti :3100); [ -z "$pids" ] || kill $pids
    healthcheck: curl -sf http://127.0.0.1:3100
    port: 3100
    depends_on: []
